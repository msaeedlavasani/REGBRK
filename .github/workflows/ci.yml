name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (build, lint, test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: regbrk
          POSTGRES_PASSWORD: regbrk_ci_password
          POSTGRES_DB: regbrk_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U regbrk"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: apps/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run migrations
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: regbrk
          DB_PASSWORD: regbrk_ci_password
          DB_NAME: regbrk_ci
        run: npm run migration:run

      - name: Test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: regbrk
          DB_PASSWORD: regbrk_ci_password
          DB_NAME: regbrk_ci
        run: npm run test

      - name: Run e2e tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: regbrk
          DB_PASSWORD: regbrk_ci_password
          DB_NAME: regbrk_ci
          JWT_SECRET: ci-test-secret
          JWT_EXPIRES_IN: 3600
        run: npm run test:e2e

  frontend:
    name: Frontend (build, lint, test)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
