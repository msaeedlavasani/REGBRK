services:
  postgres:
    image: postgres:16-alpine
    container_name: regbrk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: regbrk
      POSTGRES_PASSWORD: regbrk_dev_password
      POSTGRES_DB: regbrk_dev
    ports:
      - "5432:5432"
    volumes:
      - regbrk_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U regbrk"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
    container_name: regbrk-backend
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: regbrk
      DB_PASSWORD: regbrk_dev_password
      DB_NAME: regbrk_dev
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../../apps/frontend
      dockerfile: Dockerfile
    container_name: regbrk-frontend
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      - backend

volumes:
  regbrk_postgres_data:
