
services:
  postgres:
    image: postgres:16-alpine
    container_name: regbrk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: regbrk
      POSTGRES_PASSWORD: regbrk_dev_password
      POSTGRES_DB: regbrk_dev
    ports:
      - "5432:5432"
    volumes:
      - regbrk_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U regbrk"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  regbrk_postgres_data:
